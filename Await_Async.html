<!DOCTYPE html>
<html>

<body>
    <h2>JavaScript Async/Await</h2>
    <h1 id="result"></h1>
    <script>
        async function mul(a, b) {
            let reponse = await a * b;
            display(reponse);
        }
        function display(some) {
            document.getElementById("result").innerHTML = some;
        }
        mul(33.5, 2);
    </script>
</body>

</html>
