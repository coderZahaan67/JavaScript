<!DOCTYPE html>
<html>
<head>
    <title>Age & Name Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"] {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="submit"] {
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        #message {
            text-align: center;
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            min-height: 20px;
            display: none;
        }

        #message.show {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Voter Check</h1>
    <script>
        function validateForm() {
            var name = document.forms["myForm"]["fname"].value;
            var x = document.forms["myForm"]["fage"].value;
            var messageDiv = document.getElementById("message");
            
            if (name == "") {
                alert("Name must be filled out");
                return false;
            }
            
            if (x == "") {
                alert("Age must be filled out");
                return false;
            }
            
            var age = parseInt(x);
            if (isNaN(age) || age < 0 || age > 100) {
                alert("Please enter a valid age");
                return false;
            }
            
            messageDiv.classList.remove("success", "error");
            
            if (age < 18) {
                messageDiv.innerHTML = `❌ Sorry ${name}, you are not old enough to vote. You must be 18+`;
                messageDiv.classList.add("error", "show");
            } else {
                messageDiv.innerHTML = `✅ Congratulations ${name}, you are old enough to vote!`;
                messageDiv.classList.add("success", "show");
            }
            return false;
        }
    </script>
    <form name="myForm" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="fname">Name:</label>
            <input type="text" name="fname" id="fname" placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label for="fage">Age:</label>
            <input type="text" name="fage" id="fage" placeholder="Enter your age">
        </div>
        
        <input type="submit" value="Submit">
    </form>
    
    <p id="message"></p>
    </div>
</body>

</html>
