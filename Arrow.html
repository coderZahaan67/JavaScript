<!DOCTYPE html>
<html>
    <body>
        <h2>JavaScript Arrow Function</h2>
        <p>This shows an <i>arrow function</i> with a parameter.</p>
        <p id="result"></p>
        <script>
            const add = (a,b) => a + b;
            document.getElementById("result").innerHTML = add(5, 10);
        </script>
    </body>
</html>
