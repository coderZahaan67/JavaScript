<html>
    <p id="i1"></p>
    <p id="i2"></p>
<body>
    <script>
        class student {
            constructor(name, year) {
                this.name = name;
                this.year = year;
            }
            age() {
                let d=new Date();
                return d.getFullYear() - this.year;
            }
        }
        s1 =new student("Zahaan", 2017);
        document.getElementById("i1").innerHTML ="My name is " + s1.name + ". I was born in " + s1.year + ". My age is " + s1.age();
        s1 =new student("Vaanika", 2012);
        document.getElementById("i2").innerHTML ="My name is " + s1.name + ". I was born in " + s1.year + ". My age is " + s1.age();

    </script>
</body>
</html>
