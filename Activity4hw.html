<!DOCTYPE html>
<html>

<body>
    <p>Adding numbers with Argument Objects.</p>
    <p id="result"></p>
    <script>
        function Add() {
            var i;
            var add = 0;
            for (i = 0; i < arguments.length; i++) {
                    add += arguments[i];
            }
            return add;
        }
        document.getElementById("result").innerHTML = Add(1,2,3);
    </script>
</body>
</html>
