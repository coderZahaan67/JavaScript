<!DOCTYPE html>
<html>
    <body>
        <p>Finding the largest number with Argument Objects.</p>
        <p id="result"></p>
        <script>
            function findMax()  {
                var i;
                var max = 0;
                for(i=0;i<arguments.length;i++){
                    if(arguments[i] > max) {
                        max=arguments[i];
                    }
                }
                return max;
            }
            document.getElementById("result").innerHTML=findMax(10010,1029939393,1,1000000000000000000);
        </script>
    </body>
</html>
