!DOCTYPE html>
<html>

<body>
    <h2>JavaScript Array Methods</h2>
    <p id="myjoin"></p>
    <p id="myfirstpop"></p>
    <p id="mysecondpop"></p>
    <p id="demo"></p>
    <script>
        var cars = ["Porsche", "Buggati", "Ferrari", "Lamborghini"]
        document.getElementById("myjoin").innerHTML = cars.join(" * ");
        document.getElementById("myfirstpop").innerHTML = cars;
        cars.pop();
        document.getElementById("mysecondpop").innerHTML = cars;
         document.getElementById("demo").innerHTML = cars[4];
          document.getElementById("demo").innerHTML = cars[3];
           document.getElementById("demo").innerHTML = cars[2];
            document.getElementById("demo").innerHTML = cars[1];
    </script>
</body>

</html>
